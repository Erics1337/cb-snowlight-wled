; Example WLED PlatformIO override for developing CB SnowLIGHT locally.
;
; Copy this into your WLED checkout as platformio_override.ini.
; Assumes WLED/ lives alongside cb-snowlight-usermod/ in this repo.
; Start with recoverable hardware before flashing the GL-MC-003WL.

[platformio]
build_cache_dir = ./.buildcache

[env:cb_snowlight_nodemcuv2]
extends = env:nodemcuv2
build_flags =
  ${env:nodemcuv2.build_flags}
  -D WLED_DISABLE_ALEXA
  -D WLED_DISABLE_ESPNOW
  -D WLED_DISABLE_INFRARED
  -D WLED_DISABLE_MQTT
  -I wled00
  -I .platformio-core/packages/framework-arduinoespressif8266/libraries/ESP8266WiFi/src
  -I .platformio-core/packages/framework-arduinoespressif8266/libraries/ESP8266mDNS/src
  -I .platformio-core/packages/framework-arduinoespressif8266/libraries/LittleFS/src
  -I .platformio-core/packages/framework-arduinoespressif8266/libraries/ESP8266HTTPClient/src
  -I .platformio-core/packages/framework-arduinoespressif8266/libraries/ArduinoOTA
  -I .platformio-core/packages/framework-arduinoespressif8266/libraries/DNSServer/src
  -I .platformio-core/packages/framework-arduinoespressif8266/libraries/ESP8266WebServer/src
  -I .platformio-core/packages/framework-arduinoespressif8266/libraries/Hash/src
  -I .platformio-core/packages/framework-arduinoespressif8266/libraries/SPI
  -I .platformio-core/packages/framework-arduinoespressif8266/libraries/Wire
  -I .platformio-core/packages/framework-arduinoespressif8266/tools/sdk/include
  -I .pio/libdeps/cb_snowlight_nodemcuv2/ESPAsyncTCP/src
  -I .pio/libdeps/cb_snowlight_nodemcuv2/ESPAsyncUDP/src
  -I .pio/libdeps/cb_snowlight_nodemcuv2/ESPAsyncWebServerWLED/src
  -I .pio/libdeps/cb_snowlight_nodemcuv2/AsyncMqttClient/src
  -I .pio/libdeps/cb_snowlight_nodemcuv2/QuickEspNow/src
custom_usermods =
  ${env:nodemcuv2.custom_usermods}
  cb-snowlight-usermod = symlink://../cb-snowlight-usermod

; ESP8266 size-reduction options to consider if the HTTPS build is too large.
; build_flags =
;   ${common.build_flags_esp8266}
;   -D WLED_DISABLE_ALEXA
;   -D WLED_DISABLE_HUESYNC
;   -D WLED_DISABLE_INFRARED
;   -D WLED_DISABLE_MQTT

[env:esp32dev]
extends = env:esp32dev
custom_usermods =
  ${env:esp32dev.custom_usermods}
  symlink://../cb-snowlight-usermod
